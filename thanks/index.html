<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>You're In — The Copy Grind</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/typeface-minecraft@1.0.0/index.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/images/icon.ico" type="image/x-icon" />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --green: #00ff6a;
        --black: #1c1c1c;
        --white: #ffffff;
        --grey: #888888;
        --glow: 0 0 18px rgba(73, 73, 73, 0.35);
      }

      html,
      body {
        min-height: 100%;
        background: var(--white);
        font-family: "Instrument Sans", sans-serif;
        color: var(--black);
        overflow-x: hidden;
      }

      .grid-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }

      .grid-lines {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(28, 28, 28, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(28, 28, 28, 0.07) 1px, transparent 1px);
        background-size: 48px 48px;
      }

      .grid-vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 70% 60% at 50% 50%,
          transparent 0%,
          rgba(255, 255, 255, 0.55) 55%,
          rgba(255, 255, 255, 0.92) 80%,
          #ffffff 100%
        );
      }

      .corner {
        position: fixed;
        width: 22px;
        height: 22px;
        border-color: rgba(0, 255, 106, 0.35);
        border-style: solid;
        z-index: 2;
        pointer-events: none;
      }
      .corner.tl {
        top: 20px;
        left: 20px;
        border-width: 1px 0 0 1px;
      }
      .corner.tr {
        top: 20px;
        right: 20px;
        border-width: 1px 1px 0 0;
      }
      .corner.bl {
        bottom: 20px;
        left: 20px;
        border-width: 0 0 1px 1px;
      }
      .corner.br {
        bottom: 20px;
        right: 20px;
        border-width: 0 1px 1px 0;
      }

      .page {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 24px 80px;
        text-align: center;
      }

      .check-wrap {
        width: 64px;
        height: 64px;
        border: 2px solid var(--black);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 36px;
        box-shadow: var(--glow);
        animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        position: relative;
      }

      .check-wrap::after {
        content: "";
        position: absolute;
        inset: -8px;
        border-radius: 50%;
        border: 1px solid #1c1c1c;
        animation: pulse 2.4s ease-in-out infinite;
      }

      .check-wrap svg {
        width: 28px;
        height: 28px;
        stroke: var(--black);
        stroke-width: 2.5;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 40;
        stroke-dashoffset: 40;
        animation: drawCheck 0.5s 0.3s ease forwards;
      }

      .eyebrow {
        font-family: "Minecraft";
        font-size: 9px;
        color: var(--black);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        animation: fadeUp 0.6s 0.2s ease both;
      }
      .eyebrow::before,
      .eyebrow::after {
        content: "";
        display: block;
        width: 28px;
        height: 1px;
        background: var(--bla);
        opacity: 0.5;
      }

      .headline {
        font-size: clamp(2.2rem, 6vw, 3.8rem);
        font-weight: 900;
        font-family: "Instrument Sans", sans-serif;
        letter-spacing: -0.03em;
        line-height: 1.08;
        color: var(--black);
        margin-bottom: 18px;
        animation: fadeUp 0.6s 0.28s ease both;
      }

      .headline span {
        color: var(--black);
      }

      .subtext {
        font-size: 1rem;
        font-weight: 400;
        color: var(--grey);
        font-family: "Instrument Sans", sans-serif;
        max-width: 420px;
        line-height: 1.65;
        margin-bottom: 48px;
        animation: fadeUp 0.6s 0.36s ease both;
      }

      .divider {
        width: 48px;
        height: 2px;
        background: var(--black);
        margin: 0 auto 48px;
        opacity: 0.5;
        animation: fadeUp 0.6s 0.4s ease both;
      }

      .discord-card {
        width: 100%;
        max-width: 420px;
        background: rgba(0, 0, 0, 0.03);
        border: 1px solid rgba(0, 255, 106, 0.25);
        border-top: 2px solid var(--green);
        border-radius: 6px;
        padding: 28px 32px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        animation: fadeUp 0.6s 0.46s ease both;
      }

      .discord-label {
        font-family: "Minecraft", monospace;
        font-size: 8px;
        color: var(--black);
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .discord-text {
        font-size: 0.9rem;
        color: var(--black);
        line-height: 1.6;
        text-align: center;
      }

      .discord-btn {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: var(--green);
        color: var(--black);
        font-family: "Instrument Sans", sans-serif;
        font-weight: 700;
        font-size: 0.9rem;
        letter-spacing: 0.02em;
        text-decoration: none;
        padding: 13px 28px;
        border-radius: 4px;
        margin-top: 4px;
        transition:
          filter 0.18s ease,
          box-shadow 0.18s ease;
      }

      .discord-btn:hover {
        filter: brightness(0.9);
        box-shadow: var(--glow);
      }

      .discord-btn svg {
        width: 18px;
        height: 18px;
        fill: var(--black);
        flex-shrink: 0;
      }

      .footer-tag {
        position: fixed;
        bottom: 16px;
        right: 24px;
        font-family: "Minecraft", monospace;
        font-size: 7px;
        color: rgba(0, 255, 106, 0.3);
        letter-spacing: 0.1em;
        z-index: 2;
        pointer-events: none;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes popIn {
        from {
          opacity: 0;
          transform: scale(0.5);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes drawCheck {
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.15;
          transform: scale(1);
        }
        50% {
          opacity: 0.5;
          transform: scale(1.08);
        }
      }
    </style>
  </head>
  <body>
    <div class="grid-bg">
      <div class="grid-lines"></div>
      <div class="grid-vignette"></div>
    </div>

    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="page">
      <div class="check-wrap">
        <svg viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </div>

      <p class="eyebrow">You're in</p>

      <h1 class="headline">Thanks for<br /><span>subscribing!</span></h1>
      <p class="subtext">Keep an eye on your inbox.</p>

      <div class="divider"></div>

      <div class="discord-card">
        <p class="discord-label">Community</p>
        <p class="discord-text">
          Join the Discord community to connect with 360+ copywriters.
        </p>
        <a
          href="https://discord.gg/cXAvygEcDg"
          target="_blank"
          rel="noopener noreferrer"
          class="discord-btn"
        >
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.055a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"
            />
          </svg>
          I want in
        </a>
      </div>
    </div>

    <div style="margin-right: 50px" class="footer-tag">TCG © 2025</div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script>
      window.addEventListener("load", () => {
        confetti({
          particleCount: 120,
          spread: 80,
          origin: { y: 0.6 },
          colors: ["#00FF6A", "#1c1c1c", "#888888"],
        });
      });
    </script>
  </body>
</html>
