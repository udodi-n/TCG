<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're In — The Copy Grind</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/typeface-minecraft@1.0.0/index.min.css" rel="stylesheet">
  <link rel="icon" href="/images/icon.ico" type="image/x-icon" />

  <style>
    :root {
      --tcg-green: #00FF6A;
      --tcg-black: #1C1C1C;
      --tcg-white: #FFFFFF;
      --tcg-grey: #888888;
      --font-main: 'Instrument Sans', sans-serif;
      --font-minecraft: 'minecraft', monospace;
      --font-libre: 'Libre Baskerville', serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-main);
      background: var(--tcg-white);
      color: var(--tcg-black);
      overflow-x: hidden;
      min-height: 100vh;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
    }

    nav .logo img {
      height: 96px;
      display: block;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 32px;
      align-items: center;
    }

    nav ul li a {
      font-family: var(--font-main);
      font-weight: 600;
      font-size: 20px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--tcg-black);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav ul li a:hover { color: #555; }

    nav ul li.cta a {
      background: var(--tcg-black);
      color: var(--tcg-white);
      padding: 10px 22px;
      font-size: 20px;
    }

    nav ul li.cta a:hover { background: #333; color: var(--tcg-white); }

    .page-wrapper {
      position: relative;
      overflow: hidden;
      min-height: calc(100vh - 130px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .page-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 50%, black 30%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 80px 24px;
    }

    .check-wrap {
      width: 64px;
      height: 64px;
      padding: 4rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      position: relative;
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    .check-wrap img {
      height:128px;
    }

    .eyebrow {
      font-family: var(--font-minecraft);
      font-size: 9px;
      color: var(--tcg-black);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--tcg-black);
      opacity: 0.4;
    }

    .headline {
      font-family: var(--font-minecraft);
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      line-height: 1.3;
      color: var(--tcg-black);
      margin-bottom: 16px;
      animation: fadeUp 0.6s 0.28s ease both;
    }

    .subtext {
      font-family: var(--font-main);
      font-size: 1.1rem;
      font-weight: 400;
      color: #444;
      max-width: 420px;
      line-height: 1.65;
      margin-bottom: 48px;
      animation: fadeUp 0.6s 0.36s ease both;
    }

    hr.divider {
      width: 60%;
      max-width: 320px;
      border: none;
      border-top: 1.5px solid rgba(0, 0, 0, 0.336);
      margin-bottom: 48px;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .discord-card {
      width: 100%;
      max-width: 440px;
      border: 1px solid var(--tcg-green);
      border-top: 2px solid var(--tcg-green);
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: fadeUp 0.6s 0.46s ease both;
    }

    .discord-label {
      font-family: var(--font-minecraft);
      font-size: 8px;
      color: var(--tcg-black);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .discord-text {
      font-family: var(--font-main);
      font-size: 1rem;
      color: var(--tcg-black);
      line-height: 1.65;
      text-align: center;
    }

    .discord-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--tcg-black);
      color: var(--tcg-green);
      font-family: var(--font-main);
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 13px 28px;
      margin-top: 4px;
      transition: background 0.2s;
    }

    .discord-btn:hover {
      background: #333;
    }

    .discord-btn svg {
      width: 18px;
      height: 18px;
      fill: var(--tcg-green);
      flex-shrink: 0;
    }

    footer {
      padding: 40px 24px;
      text-align: center;
      border-top: 1px solid rgba(0,0,0,0.08);
    }

    footer .footer-copy {
      font-size: 13px;
      color: var(--tcg-grey);
      line-height: 1.8;
    }

    footer .footer-copy a {
      color: var(--tcg-black);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    footer .copyright {
      margin-top: 12px;
      font-size: 12px;
      color: #bbb;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes drawCheck {
      to { stroke-dashoffset: 0; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.08); }
    }

    @media (max-width: 600px) {
      .logo a img {
        height: 72px;
      }
      nav { padding: 14px 20px; }
      nav ul { gap: 16px; }
      nav ul li a { font-size: 11px; }
      nav ul li.cta a { padding: 8px 14px; font-size: 11px; }
      .headline { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">
      <a href="/">
        <img src="https://i.ibb.co/My0JYnQV/20260422-123014.png" alt="The Copy Grind Logo" />

    <ul>
      <li><a href="/#subscribe">Subscribe</a></li>

          I want in
        </a>
      </div>
    </div>
  </div>

  <footer>
    <p class="copyright">&copy; 2024 The Copy Grind. All rights reserved.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <script>
    window.addEventListener('load', () => {
      confetti({
        particleCount: 120,
        spread: 80,
        origin: { y: 0.6 },
        colors: ['#00FF6A', '#1c1c1c', '#888888'],
      });
    });

</body>
</html>
